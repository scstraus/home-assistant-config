cards: 




  - type: custom:layout-card
    layout_type: custom:vertical-layout
    cards:



    - type: custom:popup-card
      entity: sensor.sean_location
      title: Sean Location History and Time to Home
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - sensor.sean_location
        - type: markdown
          content: |
            ## {{ states('sensor.sean_eta')}}
            {{ states('sensor.sean_eta_description')}} 
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: sensor.sophie_location
      title: Sophie Location History and Time to Home
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - sensor.sophie_location
        - type: markdown
          content: |
            ## {{ states('sensor.sophie_eta')}}
            {{ states('sensor.sophie_eta_description')}} 
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: sensor.alena_location
      title: Alena Location History and Time to Home
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - sensor.alena_location
        - type: markdown
          content: |
            ## {{ states('sensor.alena_eta')}}
            {{ states('sensor.alena_eta_description')}} 
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: input_boolean.sophies_air_purifier
      title: "Sophie's Air Purifier"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - input_boolean.sophies_air_purifier
        - type: history-graph
          entities:
            - sensor.hlubocepy_air_quality
  #      - type: history-graph
  #        entities:
  #          - sensor.sophies_room_aqi
  #      - type: markdown
  #        content: |
  #          Last Hour Availability:
        - type: history-graph
          entities:
            - fan.sophies_room_air_purifier
          hours_to_show: 1
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: input_boolean.sebastians_air_purifier
      title: "Sebastian's Air Purifier"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - input_boolean.sebastians_air_purifier
        - type: history-graph
          entities:
            - sensor.hlubocepy_air_quality
  #      - type: history-graph
  #        entities:
  #          - sensor.sebastians_room_aqi
  #      - type: markdown
  #        content: |
  #          Last Hour Availability:
        - type: history-graph
          entities:
            - fan.sebastians_room_air_purifier
          hours_to_show: 1
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: fan.master_bedroom_air_purifier
      title: "Master Bedroom Air Purifier"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - fan.master_bedroom_air_purifier
        - type: history-graph
          entities:
            - sensor.hlubocepy_air_quality
  #      - type: history-graph
  #        entities:
  #          - sensor.master_bedroom_aqi
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: binary_sensor.cooper_s_e_all4_door_lock_state
      title: "Car Lock"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: entities
          entities:
            - binary_sensor.cooper_s_e_all4_door_lock_state
        - type: history-graph
          entities:
            - binary_sensor.cooper_s_e_all4_door_lock_state
        - type: button
          name: Press to Lock the Car
          tap_action:
            action: call-service
            service: lock.lock
            service_data:
              entity_id: lock.cooper_s_e_all4_lock
          entity: lock.cooper_s_e_all4_lock
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />


    - type: custom:popup-card
      entity: sensor.last_lightning
      title: "Lightning strikes and distance in last hour"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          hours_to_show: 1
          entities:
            - sensor.weatherflow_last_lightning_strike_distance
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />


    - type: custom:popup-card
      entity: sensor.trash_display
      title: "Trash Needs Taking Out"
      card:
        type: 'custom:button-card'
        entity: sensor.trash_display
        name: I took it out!
        tap_action:
          action: call-service
          service: input_boolean.turn_off
          service_data:
            entity_id: input_boolean.trash_needs_taking_out
        
#      card:
