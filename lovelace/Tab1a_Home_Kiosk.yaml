#        entity: sensor.trash_display

    - type: custom:popup-card
      entity: sensor.rain_sensor
      title: "Rain Summary"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - sensor.rain_sensor
        - type: history-graph
          entities:
            - sensor.weatherflow_precipitation_rate
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: sensor.high_wind_warning
      title: "Wind Summary"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - sensor.high_wind_warning
        - type: history-graph
          entities:
            - sensor.tempest_st_00175075_wind_speed
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />

