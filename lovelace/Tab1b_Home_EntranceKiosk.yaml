        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: binary_sensor.cooper_s_e_all4_door_lock_state
      title: "Car Lock"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: entities
          entities:
            - binary_sensor.cooper_s_e_all4_door_lock_state
        - type: history-graph
          entities:
            - binary_sensor.cooper_s_e_all4_door_lock_state
        - type: button
          name: Press to Lock the Car
          tap_action:
            action: call-service
            service: lock.lock
            service_data:
              entity_id: lock.cooper_s_e_all4_lock
          entity: lock.cooper_s_e_all4_lock
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />


    - type: custom:popup-card
      entity: sensor.last_lightning
      title: "Lightning strikes and distance in last hour"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          hours_to_show: 1
          entities:
            - sensor.weatherflow_last_lightning_strike_distance
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />


