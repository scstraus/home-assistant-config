            - fan.sophies_room_air_purifier
          hours_to_show: 1
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: input_boolean.sebastians_air_purifier
      title: "Sebastian's Air Purifier"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - input_boolean.sebastians_air_purifier
        - type: history-graph
          entities:
            - sensor.hlubocepy_air_quality
