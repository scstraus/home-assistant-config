cards: 


  - type: custom:layout-card
    layout_type: custom:vertical-layout
    cards:

    - type: custom:popup-card
      entity: sensor.sean_location
      title: Sean Location History and Time to Home
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - sensor.sean_location
        - type: markdown
          content: |
            ## {{ states('sensor.sean_eta')}}
            {{ states('sensor.sean_eta_description')}} 
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: sensor.sophie_location
      title: Sophie Location History and Time to Home
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - sensor.sophie_location
        - type: markdown
          content: |
            ## {{ states('sensor.sophie_eta')}}
            {{ states('sensor.sophie_eta_description')}} 
            <br />
            <br />
            <br />

    - type: custom:popup-card
