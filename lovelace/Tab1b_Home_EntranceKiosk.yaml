      - type: 'custom:mercury-weather-card'
        weather_entity: weather.weatherflow_hourly_based_forecast 
        wind_unit: "kph"      # Settings: kph, mph, ms, fps, kn
        min_gauge_spacing: 10
        overview_font_size: 1.1em
        padding_size: 4px
        gap_size: 6px
        description_vertical_offset: 10px
#        style: |
#          ha-card {
#            border-radius: none !important;
#            margin-top: -18px !important;
#            margin-bottom: -10px !important;
#            margin-bottom: -10px !important;
#          }
        current_weather:
          temp_font_size: '5.8em'   
        overview_entities:
          - entity: sensor.tempest_st_00175075_humidity
            label: Humidity
            decimals: 0
          - entity: sensor.tempest_st_00175075_wind_speed
            label: Wind
            decimals: 1
          - entity: sensor.next_sunrise
            label: Sunrise
          - entity: sensor.next_sunset
            label: Sunset
        temperature_gauges:
          time_font_size: 1.05em
          time_font_bold: false
          min_temp: -17
          max_temp: 42
          gauge_height: 160
          forecast_icon_color: "#444444"
        precipitation_gauges:
          gauge_height: 34
          font_size: .85em

      - type: custom:platinum-weather-card
        style: |
          ha-card {
            margin-top: 0px;
            margin-bottom: 15px;
            padding-top: 0px;
            padding-bottom: 10px
          }
        card_config_version: 8
        daily_forecast_days: 4
        entity_forecast_icon_1: weather.weatherflow_day_based_forecast
        entity_forecast_max_1: weather.weatherflow_day_based_forecast
        entity_forecast_min_1: weather.weatherflow_day_based_forecast
        entity_pop_1: weather.weatherflow_day_based_forecast
        entity_pos_1: weather.weatherflow_day_based_forecast
        entity_summary_1: weather.weatherflow_day_based_forecast
        section_order:
          - overview
          - extended
          - slots
          - daily_forecast
        show_section_extended: false
        show_section_overview: false
        show_section_slots: false




