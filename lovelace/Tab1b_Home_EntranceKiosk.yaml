######################### 1ST FLOOR CARDS #########################
###################################################################

    - type: custom:layout-break


    - type: vertical-stack
      cards:


        - type: entities
          title: First Floor
          entities: []
          card_mod:
            style: |
              ha-card {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
              }
              .card-header {
                display: block !important;
                text-align: center !important;

                /* ADJUST THESE NUMBERS TO BALANCE */
                /* Format: Top (8px) Sides (16px) Bottom (8px) */
                padding: 16px 16px 20px 16px !important; 
                font-size: 24px !important; 
                font-weight: 400 !important;
                color: var(--primary-text-color) !important;
                line-height: normal !important;
              }
              #states {
                /* Ensure no extra space is added below the header */
                padding: 0px !important;
              }


      ########## LIVING ROOM CARD #################

        - type: custom:expander-card
          child-margin-top: 0px
          padding: 0
          clear: true
          title-card-button-overlay: true
          title-card-clickable: false
          expanded: false
          expanded-gap: 0.0em
          card_mod:
            style: |
              ha-card {
                border: none !important;
                box-shadow: none !important;
                background: none !important;
              }
              .content {
                border: none !important;
                padding: 8px 0px !important; /* Adds top/bottom space, removes side space */
              }
              .title {
                border: none !important;
              }
          title-card:
            type: custom:vertical-stack-in-card
            card_mod:
              style: |
                ha-card {
                  border-bottom: none !important;
                  box-shadow: none !important;
                }
            cards:
              # --- TOP ROW ---
              - type: horizontal-stack
                cards:

                  - type: custom:mushroom-template-card
                    primary: Living Room
                    icon: mdi:sofa
                    layout: vertical
                    card_mod:
                      style:
                        mushroom-shape-icon$: |
                          .shape {
                            background: none !important;
                          }
                        .: |
                          ha-card {
                            background: none !important;
                            border: none !important;
                            box-shadow: none !important;
                            /* This moves the entire card (icon + text) up by 6px */
                            margin-top: -15px !important; 
                          }
                          mushroom-state-info {
                            margin-top: -25px !important; /* Keeps the tight text-to-icon gap */
                          }
                          mushroom-state-item {
                            gap: 0px !important;
                          }
                          :host {
                            --mush-icon-size: 70px;
                            --primary-font-weight: 660;
                          }


                  - type: custom:mushroom-light-card
                    entity: group.living_room_lights
                    name: Lights
                    icon: mdi:lightbulb-group
                    card_mod:
                      style: |
                        ha-card {
                          background: none !important;
                          border: none !important;
                          box-shadow: none !important;
                          margin-top: 0px !important; 
                          margin-bottom: -10px !important; 
                          width: 100% !important;
                        }


