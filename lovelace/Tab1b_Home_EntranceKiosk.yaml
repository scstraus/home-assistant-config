    - type: entity-filter
      state_filter:
      - "on"
      - "Delivery"
      - "delivery"
      - "yes"
      - "Open"
      - "Clean"
      - "Today"
      - "Tomorrow"
      - "armed_away"
      - "!Now!"
      - operator: ">"
        value: -1
      - "Drizzle"
      - "Slight"
      - "Moderate"
      - "Heavy"
      - "Very Heavy"
      - "High"
      - "Very High"
      - "Dangerous"
      - "Moderate Rain"
      - "Heavy Rain"
      - "Heavy Shower"
      - "Very Heavy Shower"
      - "Violent Shower"
      entities:
      - sensor.posta_variable
      - sensor.dhl_variable
      - sensor.dpd_variable
      - sensor.gls_variable
      - sensor.bio_odpad_day
      - sensor.bike_day
      - binary_sensor.back_door
      - binary_sensor.garage_door
      - binary_sensor.front_door_zone_1
      - binary_sensor.popp_unknown_type_0004_id_0014_sensor
      - input_select.miele_washing_machine_status
      - input_select.lg_washing_machine_status
      - binary_sensor.ecolink_garage_door
      - alarm_control_panel.laundry_room_window
      - alarm_control_panel.motion_sensors
      - alarm_control_panel.windows_and_garage_door
      - sensor.trash_display
      - binary_sensor.basement_sliding_door
      - sensor.kite_day
      - sensor.rain_sensor
      - sensor.high_wind_warning
      - entity: sensor.last_lightning
        state_filter:
          - operator: "!="
            value: "no"
      card: 
        type: glance
#        title: "Happening Today"
        columns: 3
      show_empty: false      

#      - input_select.bosch_dishwasher_status

    - type: entity-filter
      card: 
        title: "!!! EMERGENCY ALERT !!!"
        show_header_toggle: false
      entities:
      - binary_sensor.2nd_floor_smoke
      - binary_sensor.laundry_room_smoke
      - binary_sensor.kitchen_smoke
      - binary_sensor.play_room_smoke
      - sensor.house_electricity
  #    - sensor.object_detection_front
