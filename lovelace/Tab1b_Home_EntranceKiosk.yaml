  #    - sensor.object_detection_right
  #    - sensor.object_detection_back
#      - binary_sensor.human_back
#      - binary_sensor.human_front 
#      - binary_sensor.human_left
#      - binary_sensor.human_right
      - binary_sensor.basement_is_flooding
      - binary_sensor.basement_flood_sensor
      state_filter:
      - "red"
      - "Emergency"
      - "power_out"
      - "on"
      - "yes"
      show_empty: false

    
    - type: custom:auto-entities
      show_empty: false
      card:
        type: entities
        title: Devices Reporting Problems
        show_header_toggle: false
      filter: 
        include: 
          - entity_id: "*nest*"
            or: 
              - state: "unavailable"
              - state: "Warning"
              - state: "grey"
              - state: "yellow"
              - state: "off"
              - state: "disconnected"
          - entity_id: "zwave.*"
            or: 
              - state: "dead"          
              - state: "unavailable"
          - entity_id: "*status_smart*"
            or:
              - state: "warning"
              - state: "critical"
              - state: "failing"
              - state: "access error"
              - state: "Replace"
          - entity_id: "binary_sensor.alarm_connection"
            or:
              - state: "warning"
              - state: "access error"
              - state: "unavailable"
              - state: "disconnected"
      show_empty: false
