          entities:
            - fan.sebastians_room_air_purifier
          hours_to_show: 1
        - type: markdown
          content: |
            <br />
            <br />
            <br />
            <br />
            <br />

    - type: custom:popup-card
      entity: fan.master_bedroom_air_purifier
      title: "Master Bedroom Air Purifier"
      card:
        type: vertical-stack
        in_card: true
        cards:
        - type: history-graph
          entities:
            - fan.master_bedroom_air_purifier
        - type: history-graph
          entities:
            - sensor.hlubocepy_air_quality
  #      - type: history-graph
  #        entities:
